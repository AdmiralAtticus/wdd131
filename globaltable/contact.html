<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Table — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .contact-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      color: var(--charcoal);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--charcoal);
      background: white;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--terracotta);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .submit-btn {
      background: var(--terracotta);
      color: white;
      border: none;
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: var(--terracotta-dark); }

    .success-msg {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #2e7d32;
      font-weight: 600;
      text-align: center;
      display: none;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <span class="nav-globe">🌍</span>
    Global Table
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="cultures.html">Cultures</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="contact-wrap">
  <div class="accent-line"></div>
  <h2 class="section-title">Get in Touch</h2>
  <p class="section-sub" style="margin-bottom:2rem;">Have a question, suggestion, or want to see your culture featured? Let us know!</p>

  <div class="form-group">
    <label for="fname">Your Name</label>
    <input type="text" id="fname" placeholder="e.g. Maria Santos">
  </div>
  <div class="form-group">
    <label for="femail">Email Address</label>
    <input type="email" id="femail" placeholder="you@example.com">
  </div>
  <div class="form-group">
    <label for="ftopic">Topic</label>
    <select id="ftopic">
      <option value="">Select a topic...</option>
      <option>Suggest a Culture</option>
      <option>Report an Error</option>
      <option>General Question</option>
      <option>Collaboration</option>
    </select>
  </div>
  <div class="form-group">
    <label for="fmsg">Message</label>
    <textarea id="fmsg" placeholder="Tell us what's on your mind..."></textarea>
  </div>
  <button class="submit-btn" onclick="handleSubmit()">Send Message</button>
  <div class="success-msg" id="successMsg">🎉 Thanks for reaching out! We'll get back to you soon.</div>
</div>

<footer>
  <p>🌍 <span>Global Table</span> &mdash; &copy; 2026. Exploring the world one dish at a time.</p>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  function handleSubmit() {
    const name  = document.getElementById('fname').value.trim();
    const email = document.getElementById('femail').value.trim();
    const msg   = document.getElementById('fmsg').value.trim();

    if (!name || !email || !msg) {
      alert('Please fill in your name, email, and message.');
      return;
    }

    document.getElementById('fname').value  = '';
    document.getElementById('femail').value = '';
    document.getElementById('ftopic').value = '';
    document.getElementById('fmsg').value   = '';

    const s = document.getElementById('successMsg');
    s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 5000);
  }
</script>
</body>
</html>
