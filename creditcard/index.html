<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credit Card Payment</title>
  <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>

  <div class="page-wrapper">

    <div class="card card-front">
      <p class="total">TOTAL: $199</p>

      <div class="card-icon" aria-hidden="true">💳</div>

      <div class="field field-full">
        <label for="card-number">CARD NUMBER</label>
        <input
          type="text"
          id="card-number"
          placeholder="1234 5678 9101 1020"
          maxlength="19"
          autocomplete="cc-number"
        />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="card-holder">CARD HOLDER</label>
          <input
            type="text"
            id="card-holder"
            placeholder="John Doe"
            autocomplete="cc-name"
          />
        </div>

        <div class="field field-expiry">
       
          <span id="expiry-label">EXPIRATION</span>
          <div class="expiry-inputs">
            <input
              type="text"
              id="exp-month"
              placeholder="MM"
              maxlength="2"
              aria-labelledby="expiry-label"
              autocomplete="cc-exp-month"
            />
            <input
              type="text"
              id="exp-year"
              placeholder="YY"
              maxlength="2"
              aria-labelledby="expiry-label"
              autocomplete="cc-exp-year"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="card card-back">
      <div class="magnetic-stripe" aria-hidden="true"></div>

      <div class="field field-cvv">
        <label for="cvv">CVC/CVV</label>
        <input
          type="text"
          id="cvv"
          placeholder="xxx"
          maxlength="4"
          autocomplete="cc-csc"/>
      </div>
    </div>

  </div>

  <div class="submit-row">
    <button type="button" id="submit-btn">Submit</button>
  </div>
</body>
</html>
