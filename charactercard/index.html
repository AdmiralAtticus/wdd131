  <div class="card" id="character-card">

      <div class="health-bar" id="health-bar"></div>
    </div>

    <div class="buttons">
      <button id="btn-attack" onclick="monoco.attacked()">⚔ Attacked</button>
      <button id="btn-levelup" onclick="monoco.levelUp()">↑ Level Up</button>
