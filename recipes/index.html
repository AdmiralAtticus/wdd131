<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBook</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" 
    rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <meta property="og:type" content="website">
        <meta property="og:title" content="RecipeBook">
        <meta property="og:description" content="Find your next favorite recipe">
        <meta property="og:url" content="https://www.recipebook.com">
        <meta property="og:image" content="images/social-preview-image.png">

        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="RecipeBook">
        <meta name="twitter:description" content="Find your next favorite recipe">
        <meta name="twitter:image" content="images/social-preview-image.png">

        <link rel="icon" href="images/favicon.ico">
        <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    </head>
    <body>

    <header class="site-header">
        <div class="logo-wrap">
        <img src="images/recipe-book.png" alt="RecipeBook logo icon" class="logo-icon">
        <span class="logo-text">RecipeBook</span>
        </div>
    </header>

    <section class="search-section">
        <div class="search-bar">
        <input type="search" placeholder="Find a recipe" aria-label="Find a recipe">
        <button type="button" aria-label="Search">
            <img src="images/search.svg" alt="search-icon">
        </button>
        </div>
    </section>

    <main class="recipe-list">
        <article class="recipe-card">
        <img src="images/apple-crisp.jpg" alt="Bowl of apple crisp topped with vanilla ice cream" class="recipe-img">
        <div class="recipe-info">
            <span class="recipe-tag">dessert</span>
            <h2 class="recipe-title">Apple Crisp</h2>

            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>

            <p class="recipe-desc">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
        </div>
        </article>
    </main>

    <footer class="site-footer">
        <a
        class="attribution"
        href="https://www.flaticon.com/free-icons/recipe"
        title="recipe icons">Recipe icons created by Freepik - Flaticon</a>

        <div class="social">
        <a href="#" aria-label="Instagram"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#" aria-label="YouTube"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#" aria-label="Pinterest"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
    </footer>
    </body>
    </html>
